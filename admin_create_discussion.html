<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create New Forum Discussion - Admin</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap">
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="forum.css" />
  <style>
    body {
      background: #f4f6fb;
      font-family: 'Inter', sans-serif;
      margin: 0;
      min-height: 100vh;
    }
    .admin-create-container {
      max-width: 600px;
      margin: 2.5rem auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(100,100,255,0.07);
      padding: 2.5rem 2rem;
    }
    .admin-create-container h2 {
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #232946;
    }
    .admin-create-container label {
      font-weight: 600;
      color: #232946;
    }
    .admin-create-container input[type="text"],
    .admin-create-container textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 1.2rem;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      background: #f9faff;
      color: #232946;
      box-sizing: border-box;
    }
    .admin-create-container textarea {
      border-radius: 14px;
      min-height: 120px;
      resize: vertical;
    }
    .admin-create-actions {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
    }
    .btn.btn-primary {
      background: #6a82fb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.3rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn.btn-primary:hover {
      background: #232946;
    }
    .btn.btn-secondary {
      background: #eee;
      color: #232946;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.3rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-block;
    }
    .btn.btn-secondary:hover {
      background: #e0e7ff;
    }
  </style>
</head>
<body>
  <main class="admin-create-container">
    <h2>Create New Forum Discussion</h2>
    <form method="POST" action="/admin/create-forum-discussion">
      <label for="title">Discussion Title</label>
      <input type="text" id="title" name="title" placeholder="Enter discussion title" required />
      <label for="message">Discussion Message</label>
      <textarea id="message" name="message" placeholder="Enter your message" required rows="5"></textarea>
      <div class="admin-create-actions">
        <button type="submit" class="btn btn-primary">Create Discussion</button>
        <a href="/admin#forum" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </main>
</body>
</html>
